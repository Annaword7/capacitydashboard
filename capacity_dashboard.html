<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #F7F8FA;
    --bg2:    #FFFFFF;
    --bg3:    #F0F2F5;
    --border: #E4E7ED;
    --bord2:  #C8CDD8;
    --text:   #1A1D27;
    --text2:  #5A6278;
    --text3:  #9BA3B8;
    --accent: #2563EB;
    --mono:   'IBM Plex Mono','Fira Mono',monospace;
    --sans:   'Inter',system-ui,sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.5; min-height:100vh; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:16px 28px; background:var(--bg2); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  .header-left { display:flex; align-items:baseline; gap:14px; }
  .header-title { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
  .header-sub { font-size:12px; color:var(--text3); font-family:var(--mono); }

  .upload-zone { display:flex; align-items:center; gap:8px; border:1px dashed var(--bord2); border-radius:8px; padding:7px 14px; cursor:pointer; transition:all .2s; font-size:12px; color:var(--text2); }
  .upload-zone:hover { border-color:var(--accent); background:#EFF6FF; color:var(--accent); }
  .upload-zone input { display:none; }
  .upload-name { font-family:var(--mono); font-size:11px; color:var(--accent); }

  .main { padding:24px 28px; display:flex; flex-direction:column; gap:24px; }

  .stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
  .stat-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }
  .stat-val { font-size:30px; font-weight:700; font-family:var(--mono); line-height:1; }
  .stat-sub { font-size:11px; margin-top:5px; }
  .stat-period { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:4px; }

  .section { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .section-head { padding:13px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .section-title { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:var(--text2); }

  .hm-legend { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text3); font-family:var(--mono); }
  .hm-legend-bar { display:flex; gap:2px; }
  .hm-legend-bar div { width:20px; height:10px; border-radius:2px; }

  .heatmap-wrap { overflow-x:auto; }
  table.hm { border-collapse:collapse; width:max-content; min-width:100%; }
  table.hm th.corner { position:sticky; left:0; z-index:3; background:var(--bg2); min-width:155px; border-bottom:1px solid var(--border); }
  table.hm th.ph { font-size:10px; font-family:var(--mono); font-weight:600; color:var(--text3); letter-spacing:.5px; padding:10px 12px; text-align:center; white-space:nowrap; border-bottom:1px solid var(--border); background:var(--bg2); min-width:88px; }
  table.hm td.tl { position:sticky; left:0; z-index:1; background:var(--bg2); font-size:12px; font-family:var(--mono); color:var(--text2); padding:0 14px 0 20px; white-space:nowrap; border-right:1px solid var(--border); height:40px; min-width:155px; transition:background .1s; }
  table.hm tr:hover td.tl { background:var(--bg3); }
  table.hm td.cell { height:40px; min-width:88px; text-align:center; vertical-align:middle; font-size:12px; font-weight:600; font-family:var(--mono); border:1px solid rgba(0,0,0,0.03); cursor:default; transition:filter .12s; }
  table.hm td.cell:hover { filter:brightness(.92); position:relative; z-index:1; }
  table.hm td.empty { background:var(--bg3); color:var(--text3); }
  table.hm th.gh { font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--text2); padding:10px 16px; text-align:left; border-bottom:1px solid var(--border); border-left:2px solid var(--border); background:var(--bg2); white-space:nowrap; }
  table.hm th.gh:first-of-type { border-left:none; }
  table.hm th.ph.gs { border-left:2px solid var(--border); }
  table.hm td.cell.gs { border-left:2px solid var(--border); }
  .gh-inner { display:flex; align-items:center; gap:10px; }
  .gh-legend { display:flex; gap:2px; }

  .pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill { font-size:11px; font-family:var(--mono); padding:4px 11px; border-radius:20px; border:1px solid var(--bord2); cursor:pointer; color:var(--text2); background:transparent; transition:all .15s; }
  .pill:hover { border-color:var(--accent); color:var(--accent); background:#EFF6FF; }
  .pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .avg-wrap { padding:20px; }
  .chart-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1px; background:var(--border); }
  .chart-item { background:var(--bg2); padding:16px; }
  .chart-item-title { font-size:11px; font-family:var(--mono); font-weight:600; color:var(--text2); margin-bottom:10px; }
  .no-data { padding:40px; text-align:center; color:var(--text3); font-size:13px; }

  .tooltip { position:fixed; z-index:200; background:var(--bg2); border:1px solid var(--bord2); border-radius:9px; padding:11px 15px; font-size:12px; pointer-events:none; display:none; box-shadow:0 4px 20px rgba(0,0,0,0.10); }
  .tt-team { font-weight:600; font-family:var(--mono); color:var(--text); margin-bottom:7px; font-size:12px; }
  .tt-row { font-family:var(--mono); font-size:11px; color:var(--text2); display:flex; justify-content:space-between; gap:18px; margin-bottom:3px; }
  .tt-val { font-weight:600; color:var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Capacity Dashboard</span>
    <span class="header-sub" id="data-info">loading…</span>
  </div>
  <label class="upload-zone">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 9V2M4 5l3-3 3 3"/><path d="M2 11h10"/></svg>
    <span>Upload CSV</span>
    <span class="upload-name" id="file-name"></span>
    <input type="file" id="csv-input" accept=".csv">
  </label>
</div>

<div class="main">
  <div class="stat-row" id="stat-row"></div>

  <div class="section">
    <div class="section-head"><span class="section-title">Company averages by period</span></div>
    <div class="avg-wrap">
      <div id="avg-leg" style="display:flex;gap:20px;margin-bottom:14px;font-size:12px"></div>
      <div style="position:relative;height:200px"><canvas id="avg-chart"></canvas></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">Load distribution by team</span>
      <div class="pills">
        <button class="pill active" data-m="bb">Big Bets</button>
        <button class="pill" data-m="dc">Deconsolidation</button>
        <button class="pill" data-m="tc">Technical</button>
      </div>
    </div>
    <div id="team-charts" class="chart-grid"></div>
  </div>

  <div class="section">
    <div class="section-head"><span class="section-title">Heatmap</span></div>
    <div class="heatmap-wrap" id="hm-combined"></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-team" id="tt-team"></div>
  <div class="tt-row"><span>Big Bets</span><span class="tt-val" id="tt-bb"></span></div>
  <div class="tt-row"><span>Deconsolidation</span><span class="tt-val" id="tt-dc"></span></div>
  <div class="tt-row"><span>Technical</span><span class="tt-val" id="tt-tc"></span></div>
</div>

<script>
const CSV_INIT = `Team,Big Bets %,Deconsoladation %,Technical ,Submitted By,Timestamp,Reporting Week,Period\r\nCheck-Out,40,50,10,@d.arkhipenko,3/13/2026 13:57:53,3/13/2026,2026 W11\r\nAir,70,15,15,@ekaterina.averina,3/13/2026 14:34:50,3/13/2026,2026 W11\r\nCars,90,0,10,@nikolay.nikonov,3/13/2026 16:00:27,3/13/2026,2026 W11\r\nSI,50,20,30,@vladimir.chalenko,3/13/2026 16:43:02,3/13/2026,2026 W11\r\nHotcore Pricing,60,20,20,@vladimir.savvateev,3/15/2026 18:59:15,3/13/2026,2026 W11\r\nHotcore R&D,60,30,10,@vladimir.savvateev,3/15/2026 20:35:43,3/13/2026,2026 W11\r\nTransfers,40,50,10,@mikhail.sorokin,3/16/2026 9:19:07,3/13/2026,2026 W11\r\nContent,22,39,39,@slava.bezborodov,3/16/2026 9:30:08,3/13/2026,2026 W11\r\nExtranet (INT),46,12,42,@iana.postnova@emergingtravle.com,3/16/2026 9:30:08,3/13/2026,2026 W11\r\nContent,21,50,29,@slava.bezborodov,3/20/2026 7:45:43,3/20/2026,2026 W12\r\nHotcore Pricing,70,15,15,@andrew.gorshechnikov,3/20/2026 10:31:28,3/20/2026,2026 W12\r\nHotcore R&D,60,35,5,@andrew.gorshechnikov,3/20/2026 10:31:46,3/20/2026,2026 W12\r\nCars,90,0,10,@nikolay.nikonov,3/20/2026 11:37:35,3/20/2026,2026 W12\r\nTransfers,25,70,5,@mikhail.sorokin,3/20/2026 11:37:47,3/20/2026,2026 W12\r\nCheck-Out,40,50,10,@d.arkhipenko,3/20/2026 12:48:05,3/20/2026,2026 W12\r\nSearch,30,60,10,@dmitry.emets,3/20/2026 12:49:27,3/20/2026,2026 W12\r\nAir,70,20,10,@andrei.dmitriev,3/20/2026 14:04:28,3/20/2026,2026 W12\r\nRail,60,30,10,@a.kondrateva,3/20/2026 21:47:24,3/20/2026,2026 W12\r\nSI,30,30,30,@vladimir.chalenko,3/23/2026 10:31:51,3/20/2026,2026 W12\r\nExtranet (INT),41,11,48,@iana.postnova,3/23/2026 14:57:09,3/20/2026,2026 W12\r\nMobile,60,25,15,@pavel.pronin,3/26/2026 22:06:07,3/20/2026,2026 W12\r\nCars,70,20,10,@nikolay.nikonov,3/27/2026 6:04:38,3/27/2026,2026 W13\r\nContent,12,50,38,@slava.bezborodov,3/27/2026 7:25:37,3/27/2026,2026 W13\r\nB2C FE,25,65,10,@natalia.yorkina,3/27/2026 8:17:51,3/27/2026,2026 W13\r\nTransfers,20,80,0,@mikhail.sorokin,3/27/2026 9:12:45,3/27/2026,2026 W13\r\nHotcore Pricing,30,45,25,@vladimir.savvateev,3/27/2026 12:26:21,3/27/2026,2026 W13\r\nHotcore R&D,80,15,5,@vladimir.savvateev,3/27/2026 12:26:38,3/27/2026,2026 W13\r\nSearch,18,76,6,@dmitry.emets,3/27/2026 13:33:35,3/27/2026,2026 W13\r\nSI,30,40,20,@vladimir.chalenko,3/27/2026 13:34:55,3/27/2026,2026 W13\r\nExtranet,45,26,29,@iana.postnova,3/27/2026 15:28:47,3/27/2026,2026 W13`;

let S = { rows:[], periods:[], teams:[], bk:{}, avgChart:null, tc:[], metric:'bb' };

function parseCSV(txt) {
  const lines = txt.trim().split(/\r?\n/);
  const hdr = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const v=l.split(','), r={};
    hdr.forEach((h,i)=>r[h]=(v[i]||'').trim());
    return {
      team:   r['Team']||'',
      period: r['Period']||'',
      bb:  parseFloat(r['Big Bets %'])||0,
      dc:  parseFloat(r['Deconsoladation %'])||0,
      tc:  parseFloat(r['Technical'])||parseFloat(r['Technical '])||0,
    };
  }).filter(r=>r.team&&r.period);
}

function process(rows) {
  const ps=new Set(), ts=new Set(), bk={};
  rows.forEach(r=>{ ps.add(r.period); ts.add(r.team); (bk[r.team+'||'+r.period]=bk[r.team+'||'+r.period]||[]).push(r); });
  S.rows=rows; S.periods=[...ps].sort(); S.teams=[...ts].sort((a,b)=>a.localeCompare(b)); S.bk=bk;
}

function getCell(t,p) {
  const a=S.bk[t+'||'+p];
  if(!a||!a.length) return null;
  const avg=f=>Math.round(a.reduce((s,r)=>s+r[f],0)/a.length);
  return {bb:avg('bb'),dc:avg('dc'),tc:avg('tc')};
}

/* ───── colour scales (light theme) ─────

  Deconsolidation  — "low is good" → green→yellow→orange→red
  Big Bets         — "high is good" → grey-blue→blue→deep blue (white text on dark end)
  Technical        — neutral → light teal → teal (white text on dark end)
*/
const DC_SCALE = [
  [15,  '#ECFDF5','#065F46'],   // ≤15  very low — green
  [30,  '#FEF9C3','#713F12'],   // ≤30  ok       — yellow
  [45,  '#FEF3C7','#92400E'],   // ≤45  elevated  — amber
  [60,  '#FFEDD5','#9A3412'],   // ≤60  high      — orange
  [100, '#FEE2E2','#991B1B'],   // >60  critical  — red
];
const BB_SCALE = [
  [20,  '#EFF6FF','#3B5998'],   // ≤20  very low
  [35,  '#DBEAFE','#1E40AF'],   // ≤35  low
  [50,  '#BFDBFE','#1E3A8A'],   // ≤50  mid
  [70,  '#93C5FD','#1E3A8A'],   // ≤70  good
  [100, '#2563EB','#FFFFFF'],   // >70  excellent
];
const TC_SCALE = [
  [10,  '#F0FDFA','#134E4A'],
  [20,  '#CCFBF1','#0F766E'],
  [35,  '#99F6E4','#115E59'],
  [50,  '#2DD4BF','#0F4C45'],
  [100, '#0D9488','#FFFFFF'],
];

function applyScale(v, scale) {
  for (const [thr, bg, fg] of scale) if (v <= thr) return {bg, fg};
  return {bg: scale[scale.length-1][1], fg: scale[scale.length-1][2]};
}

function buildLegend(id, scale) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  scale.forEach(([,bg,fg]) => {
    const d = document.createElement('div');
    d.style.cssText = `width:20px;height:10px;border-radius:2px;background:${bg};border:1px solid ${fg}30`;
    el.appendChild(d);
  });
}

/* ── combined heatmap (3 metrics side by side) ── */
function buildCombinedHM() {
  const wrap = document.getElementById('hm-combined');
  const {periods, teams} = S;
  if (!periods.length) { wrap.innerHTML='<div class="no-data">No data</div>'; return; }

  const METRICS = [
    { label:'Deconsolidation %', scale:DC_SCALE, field:'dc' },
    { label:'Big Bets %',        scale:BB_SCALE, field:'bb' },
    { label:'Technical %',       scale:TC_SCALE, field:'tc' },
  ];
  const N = periods.length;

  const tbl = document.createElement('table');
  tbl.className = 'hm';
  const thead = tbl.createTHead();

  // Row 1: corner + group headers
  const tr0 = thead.insertRow();
  const corner = document.createElement('th');
  corner.className = 'corner'; corner.rowSpan = 2;
  tr0.appendChild(corner);

  METRICS.forEach(m => {
    const th = document.createElement('th');
    th.className = 'gh'; th.colSpan = N;
    const legendHtml = m.scale.map(([,bg,fg]) =>
      `<span style="display:inline-block;width:16px;height:8px;border-radius:2px;background:${bg};border:1px solid ${fg}20"></span>`
    ).join('');
    th.innerHTML = `<div class="gh-inner"><span>${m.label}</span><div class="gh-legend">${legendHtml}</div></div>`;
    tr0.appendChild(th);
  });

  // Row 2: period sub-headers for each group
  const tr1 = thead.insertRow();
  METRICS.forEach((m, mi) => {
    periods.forEach((p, pi) => {
      const th = document.createElement('th');
      th.className = 'ph' + (pi === 0 ? ' gs' : '');
      th.textContent = p;
      tr1.appendChild(th);
    });
  });

  // Body
  const tbody = tbl.createTBody();
  const tt = document.getElementById('tooltip');

  teams.forEach(team => {
    const tr = tbody.insertRow();
    const lbl = tr.insertCell(); lbl.className='tl'; lbl.textContent=team;

    METRICS.forEach((m, mi) => {
      periods.forEach((p, pi) => {
        const td = tr.insertCell();
        const cell = getCell(team, p);
        const val = cell ? cell[m.field] : null;
        const isGroupStart = pi === 0;

        if (val === null) {
          td.className = 'cell empty' + (isGroupStart ? ' gs' : '');
          td.textContent = '—';
        } else {
          td.className = 'cell' + (isGroupStart ? ' gs' : '');
          const c = applyScale(val, m.scale);
          td.style.background = c.bg;
          td.style.color = c.fg;
          td.textContent = val + '%';

          td.addEventListener('mouseenter', () => {
            document.getElementById('tt-team').textContent = team+' · '+p;
            document.getElementById('tt-bb').textContent = cell.bb+'%';
            document.getElementById('tt-dc').textContent = cell.dc+'%';
            document.getElementById('tt-tc').textContent = cell.tc+'%';
            tt.style.display='block';
          });
          td.addEventListener('mousemove', e => {
            tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-8)+'px';
          });
          td.addEventListener('mouseleave', () => tt.style.display='none');
        }
      });
    });
  });

  wrap.innerHTML=''; wrap.appendChild(tbl);
}

/* ── stat cards ── */
function buildStats() {
  const {periods} = S;
  if (!periods.length) return;
  const lat=periods[periods.length-1], prev=periods.length>1?periods[periods.length-2]:null;
  const avg=(p,f)=>{ let s=0,n=0; S.teams.forEach(t=>{const c=getCell(t,p);if(c){s+=c[f];n++;}}); return n?Math.round(s/n):null; };

  const row=document.getElementById('stat-row'); row.innerHTML='';
  [
    {label:'Avg Big Bets',       f:'bb', color:'#2563EB', good:'up'  },
    {label:'Avg Deconsolidation',f:'dc', color:'#DC2626', good:'down'},
    {label:'Avg Technical',      f:'tc', color:'#0D9488', good:null  },
  ].forEach(d=>{
    const cur=avg(lat,d.f), pre=prev?avg(prev,d.f):null;
    const delta=(cur!==null&&pre!==null)?cur-pre:null;
    let dHtml='';
    if(delta!==null){
      const good=d.good==='up'?delta>0:d.good==='down'?delta<0:null;
      const dc=good===true?'#16A34A':good===false?'#DC2626':'#6B7280';
      dHtml=`<span style="color:${dc};font-size:12px;font-family:var(--mono)">${delta>0?'+':''}${delta}% vs ${prev}</span>`;
    }
    const card=document.createElement('div'); card.className='stat-card';
    card.innerHTML=`<div class="stat-label">${d.label}</div><div class="stat-val" style="color:${d.color}">${cur!==null?cur+'%':'—'}</div><div class="stat-sub">${dHtml}</div><div class="stat-period">${lat}</div>`;
    row.appendChild(card);
  });

  const rep=new Set(S.rows.filter(r=>r.period===lat).map(r=>r.team));
  const tc=document.createElement('div'); tc.className='stat-card';
  tc.innerHTML=`<div class="stat-label">Teams reporting</div><div class="stat-val" style="color:#7C3AED">${rep.size}</div><div class="stat-sub" style="font-size:11px;color:var(--text3)">${[...rep].slice(0,4).join(', ')}${rep.size>4?'…':''}</div><div class="stat-period">${lat}</div>`;
  row.appendChild(tc);
}

/* ── averages chart ── */
function buildAvg() {
  const {periods} = S;
  const avg=(f)=>periods.map(p=>{let s=0,n=0; S.teams.forEach(t=>{const c=getCell(t,p);if(c){s+=c[f];n++;}}); return n?Math.round(s/n):null;});

  const ctx=document.getElementById('avg-chart');
  if (S.avgChart) S.avgChart.destroy();
  S.avgChart = new Chart(ctx,{
    type:'line',
    data:{labels:periods, datasets:[
      {label:'Big Bets',        data:avg('bb'),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.07)',tension:.4,fill:true,pointRadius:4,borderWidth:2},
      {label:'Deconsolidation', data:avg('dc'),borderColor:'#DC2626',backgroundColor:'rgba(220,38,38,0.07)',tension:.4,fill:true,pointRadius:4,borderWidth:2},
      {label:'Technical',       data:avg('tc'),borderColor:'#0D9488',backgroundColor:'rgba(13,148,136,0.07)',tension:.4,fill:true,pointRadius:4,borderWidth:2},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
      scales:{
        x:{ticks:{color:'#9BA3B8',font:{size:11,family:"'IBM Plex Mono',monospace"}},grid:{color:'#F0F2F5'}},
        y:{min:0,max:100,ticks:{color:'#9BA3B8',callback:v=>v+'%',font:{size:11,family:"'IBM Plex Mono',monospace"}},grid:{color:'#F0F2F5'}}
      }
    }
  });

  document.getElementById('avg-leg').innerHTML=[['#2563EB','Big Bets'],['#DC2626','Deconsolidation'],['#0D9488','Technical']]
    .map(([c,l])=>`<span style="display:flex;align-items:center;gap:6px;color:#5A6278"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${l}</span>`).join('');
}

/* ── team trend charts ── */
function buildTrends() {
  S.tc.forEach(c=>c.destroy()); S.tc=[];
  const {periods,teams}=S, f=S.metric;
  const col={bb:'#2563EB',dc:'#DC2626',tc:'#0D9488'}[f];
  const grid=document.getElementById('team-charts'); grid.innerHTML='';
  const active=teams.filter(t=>periods.some(p=>getCell(t,p)));
  if(!active.length){grid.innerHTML='<div class="no-data">No data</div>';return;}

  active.forEach(team=>{
    const item=document.createElement('div'); item.className='chart-item';
    item.innerHTML=`<div class="chart-item-title">${team}</div>`;
    const cw=document.createElement('div'); cw.style.cssText='position:relative;height:90px';
    const canvas=document.createElement('canvas');
    cw.appendChild(canvas); item.appendChild(cw); grid.appendChild(item);
    const data=periods.map(p=>{const c=getCell(team,p);return c?c[f]:null;});
    S.tc.push(new Chart(canvas,{
      type:'line',
      data:{labels:periods,datasets:[{data,borderColor:col,backgroundColor:col+'15',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:col,borderWidth:1.5,spanGaps:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.y}%`}}},
        scales:{
          x:{ticks:{color:'#9BA3B8',font:{size:9,family:"'IBM Plex Mono',monospace"}},grid:{display:false}},
          y:{min:0,max:100,ticks:{color:'#9BA3B8',font:{size:9,family:"'IBM Plex Mono',monospace"},callback:v=>v+'%',maxTicksLimit:4},grid:{color:'#F0F2F5'}}
        }
      }
    }));
  });
}

function render() {
  document.getElementById('data-info').textContent=`${S.rows.length} records · ${S.teams.length} teams · ${S.periods.length} periods`;
  buildStats();
  buildAvg();
  buildTrends();
  buildCombinedHM();
}

let baseRows = [];

function rowsToCSV(rows) {
  const lines = ['Team,Big Bets %,Deconsoladation %,Technical ,Period'];
  rows.forEach(r => lines.push(`${r.team},${r.bb},${r.dc},${r.tc},${r.period}`));
  return lines.join('\r\n');
}

function saveToServer(rows) {
  fetch('/api/upload', {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain; charset=utf-8' },
    body: rowsToCSV(rows)
  }).catch(() => {});
}

async function init() {
  try {
    const resp = await fetch('/api/data');
    if (resp.ok) {
      const text = await resp.text();
      const rows = parseCSV(text);
      if (rows.length) { baseRows = rows; process(baseRows); render(); return; }
    }
  } catch(e) {}
  baseRows = parseCSV(CSV_INIT);
  process(baseRows);
  render();
}

document.getElementById('csv-input').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  document.getElementById('file-name').textContent=file.name;
  const r=new FileReader();
  r.onload=ev=>{
    const newRows=parseCSV(ev.target.result);
    baseRows=newRows;
    process(baseRows);
    render();
    saveToServer(baseRows);
    e.target.value='';
  };
  r.readAsText(file);
});

document.querySelectorAll('.pill[data-m]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill[data-m]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); S.metric=btn.dataset.m; buildTrends();
  });
});

init();
</script>
</body>
</html>
