<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f7fa;
    --bg2: #ffffff;
    --bg3: #ebedf2;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.13);
    --text: #1a1d2e;
    --text2: #5a6074;
    --text3: #9ba3b8;
    --accent: #2563eb;
    --mono: 'IBM Plex Mono', 'Fira Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* ── Header ── */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .header-sub { font-size: 12px; color: var(--text2); font-family: var(--mono); }

  /* Upload zone */
  .upload-zone {
    display: flex; align-items: center; gap: 10px;
    border: 1px dashed var(--border2); border-radius: 8px;
    padding: 8px 14px; cursor: pointer; transition: border-color .2s, background .2s;
    font-size: 12px; color: var(--text2);
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(79,142,247,0.06); color: var(--text); }
  .upload-zone input { display: none; }
  .upload-icon { width: 14px; height: 14px; flex-shrink: 0; }
  .upload-name { font-family: var(--mono); font-size: 11px; color: var(--accent); }

  /* ── Main ── */
  .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 28px; }

  /* ── Stat bar ── */
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .stat-val { font-size: 32px; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 5px; }
  .stat-period { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* ── Section ── */
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .section-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .section-title { font-size: 12px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--text2); }
  .section-body { padding: 0; overflow-x: auto; }

  /* ── Heatmap ── */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap { display: grid; border-collapse: collapse; }
  .hm-header-row { display: contents; }
  .hm-row { display: contents; }

  .hm-corner { background: var(--bg2); position: sticky; left: 0; z-index: 2; }
  .hm-team-label {
    position: sticky; left: 0; z-index: 1;
    background: var(--bg2);
    font-size: 12px; font-family: var(--mono);
    color: var(--text2);
    padding: 8px 16px 8px 20px;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    display: flex; align-items: center;
  }
  .hm-period-label {
    font-size: 10px; font-family: var(--mono); font-weight: 600;
    color: var(--text3);
    padding: 10px 8px;
    text-align: center; white-space: nowrap;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .hm-cell {
    padding: 0;
    position: relative;
    border: 1px solid rgba(0,0,0,0.06);
    min-width: 72px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; font-family: var(--mono);
    cursor: default; transition: filter .15s;
  }
  .hm-cell:hover { filter: brightness(1.2); z-index: 1; }
  .hm-cell.empty { background: var(--bg3); color: var(--text3); }
  .hm-cell span { position: relative; z-index: 1; }
  .hm-empty-row { text-align: center; padding: 24px; font-size: 12px; color: var(--text3); grid-column: 1 / -1; }

  /* Legend */
  .hm-legend { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .hm-legend-bar { display: flex; gap: 2px; }
  .hm-legend-bar div { width: 16px; height: 8px; border-radius: 1px; }

  /* ── Trend chart ── */
  .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); }
  .chart-item { background: var(--bg2); padding: 16px; }
  .chart-item-title { font-size: 11px; font-family: var(--mono); color: var(--text2); margin-bottom: 10px; font-weight: 600; }
  .chart-item canvas { display: block; }

  /* ── Averages chart ── */
  .avg-chart-wrap { padding: 20px; }

  /* ── Period filter ── */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; font-family: var(--mono);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border2); cursor: pointer;
    color: var(--text2); background: transparent;
    transition: all .15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* No data */
  .no-data { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }

  /* Tooltip */
  .tooltip {
    position: fixed; z-index: 100;
    background: #ffffff; border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 14px;
    font-size: 12px; pointer-events: none;
    display: none; max-width: 220px;
  }
  .tooltip-team { font-weight: 600; margin-bottom: 4px; font-family: var(--mono); color: var(--text); }
  .tooltip-row { color: var(--text2); font-family: var(--mono); font-size: 11px; }
  .tooltip-val { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Capacity Dashboard</span>
    <span class="header-sub" id="data-info">loading…</span>
  </div>
  <label class="upload-zone" title="Upload new CSV">
    <svg class="upload-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M7 9V2M4 5l3-3 3 3"/><path d="M2 11h10"/>
    </svg>
    <span>Upload CSV</span>
    <span class="upload-name" id="file-name"></span>
    <input type="file" id="csv-input" accept=".csv">
  </label>
</div>

<div class="main">
  <!-- stat cards -->
  <div class="stat-row" id="stat-row"></div>

  <!-- heatmaps -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Deconsolidation %</span>
      <div class="hm-legend">
        <span>low</span>
        <div class="hm-legend-bar" id="leg-deconso"></div>
        <span>high</span>
      </div>
    </div>
    <div class="section-body"><div class="heatmap-wrap" id="hm-deconso"></div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">Big Bets %</span>
      <div class="hm-legend">
        <span>low</span>
        <div class="hm-legend-bar" id="leg-bb"></div>
        <span>high</span>
      </div>
    </div>
    <div class="section-body"><div class="heatmap-wrap" id="hm-bb"></div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">Technical %</span>
      <div class="hm-legend">
        <span>low</span>
        <div class="hm-legend-bar" id="leg-tech"></div>
        <span>high</span>
      </div>
    </div>
    <div class="section-body"><div class="heatmap-wrap" id="hm-tech"></div></div>
  </div>

  <!-- averages -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Company averages by period</span>
    </div>
    <div class="avg-chart-wrap">
      <div style="position:relative;height:200px"><canvas id="avg-chart"></canvas></div>
    </div>
  </div>

  <!-- team trends -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Load distribution by team</span>
      <div class="pills" id="metric-pills">
        <button class="pill active" data-m="bb">Big Bets</button>
        <button class="pill" data-m="deconso">Deconsolidation</button>
        <button class="pill" data-m="tech">Technical</button>
      </div>
    </div>
    <div id="team-charts" class="chart-grid"></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-team" id="tt-team"></div>
  <div class="tooltip-row" id="tt-bb"></div>
  <div class="tooltip-row" id="tt-dc"></div>
  <div class="tooltip-row" id="tt-tc"></div>
</div>

<script>
const EMBEDDED_CSV = `Team,Big Bets %,Deconsoladation %,Technical ,Submitted By,Timestamp,Reporting Week,Period\r\nCheck-Out,40,50,10,@d.arkhipenko,3/13/2026 13:57:53,3/13/2026,2026 W11\r\nAir,70,15,15,@ekaterina.averina,3/13/2026 14:34:50,3/13/2026,2026 W11\r\nCars,90,0,10,@nikolay.nikonov,3/13/2026 16:00:27,3/13/2026,2026 W11\r\nSI,50,20,30,@vladimir.chalenko,3/13/2026 16:43:02,3/13/2026,2026 W11\r\nHotcore Pricing,60,20,20,@vladimir.savvateev,3/15/2026 18:59:15,3/13/2026,2026 W11\r\nHotcore R&D,60,30,10,@vladimir.savvateev,3/15/2026 20:35:43,3/13/2026,2026 W11\r\nTransfers,40,50,10,@mikhail.sorokin,3/16/2026 9:19:07,3/13/2026,2026 W11\r\nContent,22,39,39,@slava.bezborodov,3/16/2026 9:30:08,3/13/2026,2026 W11\r\nExtranet (INT),46,12,42,@iana.postnova@emergingtravle.com,3/16/2026 9:30:08,3/13/2026,2026 W11\r\nContent,21,50,29,@slava.bezborodov,3/20/2026 7:45:43,3/20/2026,2026 W12\r\nHotcore Pricing,70,15,15,@andrew.gorshechnikov,3/20/2026 10:31:28,3/20/2026,2026 W12\r\nHotcore R&D,60,35,5,@andrew.gorshechnikov,3/20/2026 10:31:46,3/20/2026,2026 W12\r\nCars,90,0,10,@nikolay.nikonov,3/20/2026 11:37:35,3/20/2026,2026 W12\r\nTransfers,25,70,5,@mikhail.sorokin,3/20/2026 11:37:47,3/20/2026,2026 W12\r\nCheck-Out,40,50,10,@d.arkhipenko,3/20/2026 12:48:05,3/20/2026,2026 W12\r\nSearch,30,60,10,@dmitry.emets,3/20/2026 12:49:27,3/20/2026,2026 W12\r\nAir,70,20,10,@andrei.dmitriev,3/20/2026 14:04:28,3/20/2026,2026 W12\r\nRail,60,30,10,@a.kondrateva,3/20/2026 21:47:24,3/20/2026,2026 W12\r\nSI,30,30,30,@vladimir.chalenko,3/23/2026 10:31:51,3/20/2026,2026 W12\r\nExtranet (INT),41,11,48,@iana.postnova,3/23/2026 14:57:09,3/20/2026,2026 W12\r\nMobile,60,25,15,@pavel.pronin,3/26/2026 22:06:07,3/20/2026,2026 W12\r\nCars,70,20,10,@nikolay.nikonov,3/27/2026 6:04:38,3/27/2026,2026 W13\r\nContent,12,50,38,@slava.bezborodov,3/27/2026 7:25:37,3/27/2026,2026 W13\r\nB2C FE,25,65,10,@natalia.yorkina,3/27/2026 8:17:51,3/27/2026,2026 W13\r\nTransfers,20,80,0,@mikhail.sorokin,3/27/2026 9:12:45,3/27/2026,2026 W13\r\nHotcore Pricing,30,45,25,@vladimir.savvateev,3/27/2026 12:26:21,3/27/2026,2026 W13\r\nHotcore R&D,80,15,5,@vladimir.savvateev,3/27/2026 12:26:38,3/27/2026,2026 W13\r\nSearch,18,76,6,@dmitry.emets,3/27/2026 13:33:35,3/27/2026,2026 W13\r\nSI,30,40,20,@vladimir.chalenko,3/27/2026 13:34:55,3/27/2026,2026 W13\r\nExtranet,45,26,29,@iana.postnova,3/27/2026 15:28:47,3/27/2026,2026 W13`;

let state = { rows: [], periods: [], teams: [], byKey: {}, avgChart: null, trendCharts: [], activeMetric: 'bb' };

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const header = lines[0].split(',').map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = lines[i].split(',');
    const row = {};
    header.forEach((h, j) => row[h] = (vals[j] || '').trim());
    const bb = parseFloat(row['Big Bets %']) || 0;
    const dc = parseFloat(row['Deconsoladation %']) || 0;
    const tc = parseFloat(row['Technical']) || parseFloat(row['Technical ']) || 0;
    const period = row['Period'] || '';
    const team = row['Team'] || '';
    if (!period || !team) continue;
    rows.push({ team, bb, dc, tc, period });
  }
  return rows;
}

function process(rows) {
  const periodsSet = new Set(), teamsSet = new Set();
  const byKey = {};
  rows.forEach(r => {
    periodsSet.add(r.period);
    teamsSet.add(r.team);
    const k = r.team + '||' + r.period;
    if (!byKey[k]) byKey[k] = [];
    byKey[k].push(r);
  });
  const periods = [...periodsSet].sort();
  const teams = [...teamsSet].sort((a,b) => a.localeCompare(b));
  state.rows = rows; state.periods = periods; state.teams = teams; state.byKey = byKey;
}

function getCell(team, period) {
  const k = team + '||' + period;
  const arr = state.byKey[k];
  if (!arr || !arr.length) return null;
  const avg = f => Math.round(arr.reduce((s,r)=>s+r[f],0)/arr.length);
  return { bb: avg('bb'), dc: avg('dc'), tc: avg('tc'), n: arr.length };
}

/* ── Color scales ── */
function deconsoColor(v) {
  if (v === null) return null;
  if (v <= 15) return { bg: '#0e3a28', text: '#4ade80' };
  if (v <= 30) return { bg: '#1a3a1a', text: '#86efac' };
  if (v <= 45) return { bg: '#3a2e0a', text: '#fbbf24' };
  if (v <= 60) return { bg: '#3a1a0a', text: '#fb923c' };
  return { bg: '#3a0a0a', text: '#f87171' };
}
function bbColor(v) {
  if (v === null) return null;
  if (v >= 70) return { bg: '#0c2e52', text: '#60a5fa' };
  if (v >= 50) return { bg: '#0d2540', text: '#93c5fd' };
  if (v >= 35) return { bg: '#1a2540', text: '#a5b4fc' };
  if (v >= 20) return { bg: '#1f2040', text: '#c4b5fd' };
  return { bg: '#2a1040', text: '#e9d5ff' };
}
function techColor(v) {
  if (v === null) return null;
  if (v >= 40) return { bg: '#0a2a30', text: '#22d3ee' };
  if (v >= 25) return { bg: '#0a2230', text: '#67e8f9' };
  if (v >= 15) return { bg: '#0a1e28', text: '#a5f3fc' };
  if (v >= 8)  return { bg: '#0a1820', text: '#cffafe' };
  return { bg: '#0a1218', text: '#e0f7fa' };
}

function buildLegend(id, colorFn, steps) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  steps.forEach(v => {
    const c = colorFn(v);
    const d = document.createElement('div');
    d.style.cssText = `width:18px;height:10px;border-radius:2px;background:${c.bg};border:1px solid ${c.text}33`;
    el.appendChild(d);
  });
}

/* ── Heatmap ── */
function buildHeatmap(containerId, colorFn, field) {
  const wrap = document.getElementById(containerId);
  const { periods, teams } = state;
  if (!periods.length) { wrap.innerHTML = '<div class="no-data">No data loaded</div>'; return; }

  const colW = Math.max(72, Math.floor((window.innerWidth - 250) / periods.length));

  const tbl = document.createElement('table');
  tbl.style.cssText = 'border-collapse:collapse;width:max-content;min-width:100%';

  // Header row
  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  const corner = hr.insertCell();
  corner.style.cssText = `position:sticky;left:0;z-index:2;background:var(--bg2);min-width:140px;padding:0`;
  periods.forEach(p => {
    const th = document.createElement('th');
    th.style.cssText = `font-size:10px;font-family:var(--mono);font-weight:600;color:var(--text3);padding:10px ${Math.max(8,colW/2-20)}px;text-align:center;white-space:nowrap;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg2);min-width:${colW}px`;
    th.textContent = p;
    hr.appendChild(th);
  });

  const tbody = tbl.createTBody();
  const tt = document.getElementById('tooltip');

  teams.forEach(team => {
    const tr = tbody.insertRow();
    const tdLabel = tr.insertCell();
    tdLabel.style.cssText = `position:sticky;left:0;z-index:1;background:var(--bg2);font-size:12px;font-family:var(--mono);color:var(--text2);padding:6px 16px 6px 20px;border-right:1px solid var(--border);white-space:nowrap;min-width:140px`;
    tdLabel.textContent = team;

    periods.forEach(p => {
      const td = tr.insertCell();
      const cell = getCell(team, p);
      const val = cell ? cell[field] : null;
      const c = cell ? colorFn(val) : null;

      td.style.cssText = `min-width:${colW}px;height:38px;text-align:center;font-size:12px;font-weight:600;font-family:var(--mono);cursor:default;border:1px solid rgba(255,255,255,0.04);transition:filter .15s`;

      if (!c) {
        td.style.background = 'var(--bg3)';
        td.style.color = 'var(--text3)';
        td.textContent = '—';
      } else {
        td.style.background = c.bg;
        td.style.color = c.text;
        td.textContent = val + '%';
        td.addEventListener('mouseenter', e => {
          document.getElementById('tt-team').textContent = team + ' · ' + p;
          document.getElementById('tt-bb').innerHTML = `Big Bets <span class="tooltip-val">${cell.bb}%</span>`;
          document.getElementById('tt-dc').innerHTML = `Deconso <span class="tooltip-val">${cell.dc}%</span>`;
          document.getElementById('tt-tc').innerHTML = `Technical <span class="tooltip-val">${cell.tc}%</span>`;
          tt.style.display = 'block';
        });
        td.addEventListener('mousemove', e => {
          tt.style.left = (e.clientX + 12) + 'px';
          tt.style.top = (e.clientY - 10) + 'px';
        });
        td.addEventListener('mouseleave', () => tt.style.display = 'none');
        td.addEventListener('mouseenter', () => td.style.filter = 'brightness(1.25)');
        td.addEventListener('mouseleave', () => td.style.filter = '');
      }
      tr.appendChild(td);
    });
  });

  wrap.innerHTML = '';
  wrap.appendChild(tbl);
}

/* ── Stat cards ── */
function buildStats() {
  const { periods } = state;
  if (!periods.length) return;
  const latestP = periods[periods.length - 1];
  const prevP = periods.length > 1 ? periods[periods.length - 2] : null;

  function avg(period, field) {
    let sum = 0, n = 0;
    state.teams.forEach(t => {
      const c = getCell(t, period);
      if (c) { sum += c[field]; n++; }
    });
    return n ? Math.round(sum / n) : null;
  }

  const metrics = [
    { key: 'bb', label: 'Avg Big Bets', field: 'bb', color: '#60a5fa' },
    { key: 'dc', label: 'Avg Deconsolidation', field: 'dc', color: '#f87171' },
    { key: 'tc', label: 'Avg Technical', field: 'tc', color: '#22d3ee' },
  ];

  const row = document.getElementById('stat-row');
  row.innerHTML = '';

  metrics.forEach(m => {
    const cur = avg(latestP, m.field);
    const prev = prevP ? avg(prevP, m.field) : null;
    const delta = (cur !== null && prev !== null) ? cur - prev : null;
    const card = document.createElement('div');
    card.className = 'stat-card';
    const deltaHtml = delta !== null
      ? `<span style="color:${delta > 0 ? (m.key==='bb'?'#4ade80':'#f87171') : (m.key==='bb'?'#f87171':'#4ade80')};font-size:12px;font-family:var(--mono)">${delta > 0 ? '+' : ''}${delta}% vs ${prevP}</span>`
      : '';
    card.innerHTML = `
      <div class="stat-label">${m.label}</div>
      <div class="stat-val" style="color:${m.color}">${cur !== null ? cur + '%' : '—'}</div>
      <div class="stat-sub">${deltaHtml}</div>
      <div class="stat-period">${latestP}</div>
    `;
    row.appendChild(card);
  });

  // Teams reporting
  const reportingTeams = new Set();
  state.rows.filter(r => r.period === latestP).forEach(r => reportingTeams.add(r.team));
  const tCard = document.createElement('div');
  tCard.className = 'stat-card';
  tCard.innerHTML = `
    <div class="stat-label">Teams reporting</div>
    <div class="stat-val" style="color:#a78bfa">${reportingTeams.size}</div>
    <div class="stat-sub" style="color:var(--text3);font-size:11px">${[...reportingTeams].slice(0,4).join(', ')}${reportingTeams.size>4?'…':''}</div>
    <div class="stat-period">${latestP}</div>
  `;
  row.appendChild(tCard);
}

/* ── Averages chart ── */
function buildAvgChart() {
  const { periods } = state;
  const avgData = (field) => periods.map(p => {
    let sum = 0, n = 0;
    state.teams.forEach(t => { const c = getCell(t, p); if (c) { sum += c[field]; n++; } });
    return n ? Math.round(sum / n) : null;
  });

  const ctx = document.getElementById('avg-chart');
  if (state.avgChart) { state.avgChart.destroy(); }
  state.avgChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: periods,
      datasets: [
        { label: 'Big Bets', data: avgData('bb'), borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,0.08)', tension: 0.4, fill: true, pointRadius: 4, borderWidth: 2 },
        { label: 'Deconsolidation', data: avgData('dc'), borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.08)', tension: 0.4, fill: true, pointRadius: 4, borderWidth: 2 },
        { label: 'Technical', data: avgData('tc'), borderColor: '#22d3ee', backgroundColor: 'rgba(34,211,238,0.08)', tension: 0.4, fill: true, pointRadius: 4, borderWidth: 2 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%` } }
      },
      scales: {
        x: { ticks: { color: '#545a72', font: { size: 11, family: "'IBM Plex Mono', monospace" } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { min: 0, max: 100, ticks: { color: '#545a72', callback: v => v + '%', font: { size: 11, family: "'IBM Plex Mono', monospace" } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });

  // Custom legend
  const wrap = document.querySelector('.avg-chart-wrap');
  let leg = wrap.querySelector('.custom-leg');
  if (!leg) {
    leg = document.createElement('div');
    leg.className = 'custom-leg';
    leg.style.cssText = 'display:flex;gap:20px;margin-bottom:12px;font-size:12px';
    wrap.insertBefore(leg, wrap.firstChild);
  }
  leg.innerHTML = [
    ['#4f8ef7','Big Bets'],['#f87171','Deconsolidation'],['#22d3ee','Technical']
  ].map(([c,l])=>`<span style="display:flex;align-items:center;gap:6px;color:#8b91a8"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${l}</span>`).join('');
}

/* ── Team trend charts ── */
function buildTrendCharts() {
  const { periods, teams } = state;
  const m = state.activeMetric;
  const field = m === 'bb' ? 'bb' : m === 'deconso' ? 'dc' : 'tc';
  const color = m === 'bb' ? '#4f8ef7' : m === 'deconso' ? '#f87171' : '#22d3ee';

  state.trendCharts.forEach(c => c.destroy());
  state.trendCharts = [];

  const grid = document.getElementById('team-charts');
  grid.innerHTML = '';

  const teamsWithData = teams.filter(t => periods.some(p => getCell(t, p)));
  if (!teamsWithData.length) { grid.innerHTML = '<div class="no-data">No data</div>'; return; }

  teamsWithData.forEach(team => {
    const item = document.createElement('div');
    item.className = 'chart-item';
    const title = document.createElement('div');
    title.className = 'chart-item-title';
    title.textContent = team;
    item.appendChild(title);
    const canvasWrap = document.createElement('div');
    canvasWrap.style.cssText = 'position:relative;height:90px';
    const canvas = document.createElement('canvas');
    canvasWrap.appendChild(canvas);
    item.appendChild(canvasWrap);
    grid.appendChild(item);

    const data = periods.map(p => { const c = getCell(team, p); return c ? c[field] : null; });
    const ch = new Chart(canvas, {
      type: 'line',
      data: {
        labels: periods,
        datasets: [{
          data,
          borderColor: color,
          backgroundColor: color + '18',
          fill: true,
          tension: 0.35,
          pointRadius: 3,
          pointBackgroundColor: color,
          borderWidth: 1.5,
          spanGaps: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.parsed.y}%` } } },
        scales: {
          x: { ticks: { color: '#545a72', font: { size: 9, family: "'IBM Plex Mono', monospace" } }, grid: { display: false } },
          y: { min: 0, max: 100, ticks: { color: '#545a72', font: { size: 9, family: "'IBM Plex Mono', monospace" }, callback: v => v + '%', maxTicksLimit: 4 }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
    state.trendCharts.push(ch);
  });
}

/* ── Render all ── */
function render() {
  const { periods } = state;
  document.getElementById('data-info').textContent = `${state.rows.length} records · ${state.teams.length} teams · ${periods.length} periods`;

  buildStats();
  buildHeatmap('hm-deconso', deconsoColor, 'dc');
  buildHeatmap('hm-bb', bbColor, 'bb');
  buildHeatmap('hm-tech', techColor, 'tc');
  buildLegend('leg-deconso', deconsoColor, [5, 20, 35, 50, 70]);
  buildLegend('leg-bb', bbColor, [10, 25, 40, 55, 75]);
  buildLegend('leg-tech', techColor, [4, 10, 20, 32, 45]);
  buildAvgChart();
  buildTrendCharts();
}

/* ── CSV upload ── */
document.getElementById('csv-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    process(parseCSV(ev.target.result));
    render();
  };
  reader.readAsText(file);
});

/* ── Metric pills ── */
document.querySelectorAll('.pill[data-m]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-m]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.activeMetric = btn.dataset.m;
    buildTrendCharts();
  });
});

/* ── Init with embedded data ── */
process(parseCSV(EMBEDDED_CSV));
render();
</script>
</body>
</html>
